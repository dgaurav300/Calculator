<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
   <div class="calculator">
     <div class="header">
     <!-- Marquee animation -->   
    <marquee behavior="alternate" scrollamount="2">
        <h2>Calculator</h2>
    </marquee>
     </div>
     
      <div class="input">

      </div>
      <div class="output">

      </div>
      <div class="keys">
        <div class="btnBox">
            <button onclick="backSpace()">&lt;</button>
        </div>
        <div class="btnBox">
            <button onclick="">Clr</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(1)">1</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(2)">2</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(3)">3</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(4)">4</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(5)">5</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(6)">6</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(7)">7</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(8)">8</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(9)">9</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber(0)">0</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber('.')">.</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber('+')">+</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber('-')">-</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber('*')">*</button>
        </div>
        <div class="btnBox">
            <button onclick="pressNumber('/')">/</button>
        </div>
        
      </div>
   </div> 
</body>
</html>
